services:
  niceapimanager:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UV_HTTP_TIMEOUT: ${UV_HTTP_TIMEOUT:-120}
        UV_DEFAULT_INDEX: ${UV_DEFAULT_INDEX:-https://pypi.tuna.tsinghua.edu.cn/web/simple}
    container_name: niceapimanager
    ports:
      - "18101:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
